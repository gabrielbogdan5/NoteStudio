<!DOCTYPE html><html lang="ro">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>NoteStudio</title>
<meta name="theme-color" content="#0f0e11"><style>
:root{
  --bg:#0f0e11;
  --surface:#18171c;
  --accent:#b78fff;
  --text:#f0ecf8;
}

body{
  margin:0;
  font-family:-apple-system,BlinkMacSystemFont,Segoe UI,Roboto;
  background:var(--bg);
  color:var(--text);
  display:flex;
  flex-direction:column;
  height:100vh;
}

.topbar{
  background:var(--surface);
  padding:10px;
  display:flex;
  gap:8px;
}

.btn{
  flex:1;
  padding:10px;
  border:none;
  border-radius:8px;
  font-size:14px;
}

.btn-primary{background:var(--accent);color:#000}

.app{
  flex:1;
  display:flex;
}

.sidebar{
  width:100px;
  background:var(--surface);
  overflow:auto;
}

.note{
  padding:10px;
  font-size:12px;
  border-bottom:1px solid #222;
}

.note.active{background:#222}

.editor{
  flex:1;
  display:flex;
  flex-direction:column;
}

input{
  padding:12px;
  border:none;
  outline:none;
  background:#111;
  color:#fff;
  font-size:16px;
}

#content{
  flex:1;
  padding:12px;
  outline:none;
  font-size:16px;
}

.status{
  font-size:12px;
  padding:6px;
  text-align:center;
  background:#18171c;
}
</style></head>
<body><div class="topbar">
<button class="btn btn-primary" id="newBtn">New</button>
<button class="btn" id="saveBtn">Save</button>
<button class="btn" id="deleteBtn">Delete</button>
</div><div class="app">
<div class="sidebar" id="list"></div>
<div class="editor">
<input id="title" placeholder="Titlu">
<div id="content" contenteditable="true"></div>
<div class="status" id="status">Ready</div>
</div>
</div><script>
const state={notes:[],current:null};

const storage={
 load(){try{return JSON.parse(localStorage.getItem('ns_notes'))||[]}catch{return[]}},
 save(data){localStorage.setItem('ns_notes',JSON.stringify(data))}
};

const ui={
 list:document.getElementById('list'),
 title:document.getElementById('title'),
 content:document.getElementById('content'),
 status:document.getElementById('status')
};

let autosaveTimer=null;
let lastSaved='';

const history={stack:[],redo:[],limit:50};

function snapshot(){
 const snap={t:ui.title.value,c:ui.content.innerHTML};
 const last=history.stack.at(-1);
 if(last && last.t===snap.t && last.c===snap.c) return;
 history.stack.push(snap);
 if(history.stack.length>history.limit) history.stack.shift();
 history.redo=[];
}

function undo(){
 if(history.stack.length<2)return;
 const cur=history.stack.pop();
 history.redo.push(cur);
 apply(history.stack.at(-1));
}

function redo(){
 if(!history.redo.length)return;
 const snap=history.redo.pop();
 history.stack.push(snap);
 apply(snap);
}

function apply(s){
 ui.title.value=s.t;
 ui.content.innerHTML=s.c;
}

function init(){
 state.notes=storage.load();
 render();
 if(state.notes.length) open(state.notes[0].id);
 bind();
}

function bind(){
 newBtn.onclick=create;
 saveBtn.onclick=save;
 deleteBtn.onclick=del;

 ui.content.addEventListener('input',()=>{snapshot();auto();});
 ui.title.addEventListener('input',()=>{snapshot();auto();});

 document.addEventListener('keydown',e=>{
  if(e.ctrlKey&&e.key==='z'){e.preventDefault();undo();}
  if(e.ctrlKey&&e.key==='y'){e.preventDefault();redo();}
 });
}

function create(){
 const n={id:Date.now()+'' ,title:'',content:'',m:new Date().toISOString()};
 state.notes.unshift(n);
 state.current=n.id;
 saveAll();
 render();
 open(n.id);
}

function open(id){
 const n=state.notes.find(x=>x.id===id);
 if(!n)return;
 state.current=id;
 ui.title.value=n.title;
 ui.content.innerHTML=n.content;
 snapshot();
 render();
}

function save(){
 const n=state.notes.find(x=>x.id===state.current);
 if(!n)return;
 n.title=ui.title.value;
 n.content=ui.content.innerHTML;
 n.m=new Date().toISOString();
 saveAll();
 render();
 set('Saved');
}

function auto(){
 const now=ui.content.innerHTML+ui.title.value;
 if(now===lastSaved)return;
 set('Typing...');
 clearTimeout(autosaveTimer);
 autosaveTimer=setTimeout(()=>{
  save();
  lastSaved=now;
  set('Auto-saved');
 },500);
}

function del(){
 state.notes=state.notes.filter(n=>n.id!==state.current);
 state.current=null;
 saveAll();
 render();
 ui.title.value='';
 ui.content.innerHTML='';
}

function render(){
 ui.list.innerHTML='';
 state.notes.forEach(n=>{
  const d=document.createElement('div');
  d.className='note'+(n.id===state.current?' active':'');
  d.textContent=n.title||'Note';
  d.onclick=()=>open(n.id);
  ui.list.appendChild(d);
 });
}

function saveAll(){storage.save(state.notes)}
function set(t){ui.status.textContent=t}

document.addEventListener('DOMContentLoaded',init);
</script></body>
</html>
